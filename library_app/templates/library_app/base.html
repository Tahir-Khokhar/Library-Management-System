<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Library{% endblock %}</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f6f7fb; }
      header { background: #111827; color: #fff; padding: 14px 20px; display: flex; gap: 16px; align-items: center; }
      header a { color: #fff; text-decoration: none; font-weight: 700; }
      nav a { margin-right: 12px; color: #e5e7eb; text-decoration: none; }
      .container { padding: 20px; }
      .card { background: #fff; border-radius: 10px; padding: 16px; margin-top: 12px; }
      table { width: 100%; border-collapse: collapse; }
      th, td { border-bottom: 1px solid #e5e7eb; padding: 10px; text-align: left; }
      .row { display: flex; gap: 14px; flex-wrap: wrap; }
      .pill { display: inline-block; padding: 4px 10px; border-radius: 999px; background: #eef2ff; color: #3730a3; font-size: 12px; }
      .btn { display: inline-block; padding: 10px 14px; background: #2563eb; color: #fff; border-radius: 8px; text-decoration: none; }
      .muted { color: #6b7280; }
    </style>
  </head>
  <body>
    <header>
      <a href="{% url 'library-home' %}">Library</a>
      <nav>
        <a href="{% url 'library-sections' %}">Sections</a>
        <a href="{% url 'library-my-transactions' %}">My Transactions</a>
        <a href="{% url 'library-membership' %}">Membership</a>
      </nav>
      <div style="margin-left:auto;">
        {% if user.is_authenticated %}
          <span class="muted">Hello, {{ user.username }}.</span>
          <a style="margin-left: 10px;" class="btn" href="{% url 'auth_logout' %}">Logout</a>
        {% else %}
          <a style="margin-left: 10px;" class="btn" href="/admin/login/">Login</a>
        {% endif %}
      </div>
    </header>

    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </body>
</html>
